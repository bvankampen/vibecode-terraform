# Ollama Helm Chart Values Configuration
# References: https://github.com/otwld/ollama-helm

# Enable persistence using local-path StorageClass
persistentVolume:
  enabled: true
  storageClass: "local-path"
  size: 30Gi

# Enable GPU integration with NVIDIA GPU
ollama:
  gpu:
    enabled: true
    type: "nvidia"
    number: 1
    nvidiaResource: "nvidia.com/gpu"
  models:
    pull:
      - "gemma4:e2b"
    create:
      - name: default
        template: |
          FROM gemma4:e2b

# Extra Kubernetes manifests to deploy
extraObjects:
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: ollama-lan-ingress
      namespace: ollama
      annotations:
        nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
        nginx.ingress.kubernetes.io/proxy-body-size: "4g"
    spec:
      ingressClassName: nginx
      rules:
        - http:
            paths:
              - path: /
                pathType: Prefix
                backend:
                  service:
                    name: ollama
                    port:
                      number: 11434

